<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty — Team Details</title>
    <link rel="stylesheet" href="teamdetails.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">

        <nav class="main-sidebar">
            <div class="logo">
                <img src="../assets/tasklogo.png" style="width: 180px; height: 70px;" alt="Oppty Logo">
            </div>
            <ul class="nav-links">
                <li>
                    <a href="../dashboard/dashboard.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="9"></rect>
                            <rect x="14" y="3" width="7" height="5"></rect>
                            <rect x="14" y="12" width="7" height="9"></rect>
                            <rect x="3" y="16" width="7" height="5"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="active">
                    <a href="../teams/teams.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Teams</span>
                    </a>
                </li>
                <li>
                    <a href="../tasks/tasks.html">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        <span>Tasks</span>
                    </a>
                </li>
                
            </ul>
        </nav>

        <div class="main-content">
            <div class="breadcrumb">
                <a href="../teams/teams.html">Teams</a>
                <span class="breadcrumb-separator">/</span>
                <span id="breadcrumbTeamName">Loading...</span>
            </div>
            
            <div class="page-header">
                <div class="page-header-left">
                    <div id="headerIcon" class="team-header-icon">👥</div>
                    <div class="team-header-text">
                        <h1 id="headerTeamName">Loading...</h1>
                        <p id="headerTeamDept">Department</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="openAssignTaskBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Assign Task
                    </button>
                    <button class="btn-primary" id="openAddMemberBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Add Member
                    </button>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-number" id="statMembers">0</span>
                    <span class="stat-label">Total Members</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="statPending">0</span>
                    <span class="stat-label">Pending Tasks</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="statCompleted">0</span>
                    <span class="stat-label">Completed Tasks</span>
                </div>
                <div class="stat-card stat-danger">
                    <span class="stat-number" id="statOverdue">0</span>
                    <span class="stat-label">Overdue Tasks</span>
                </div>
            </div>

            <h2 class="section-title">Team Members</h2>
            <div class="table-container">
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Tasks (Active/Done)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Team Member</h2>
                <button class="modal-close" id="closeAddMemberBtn">&times;</button>
            </div>
            <form id="newMemberForm">
                <div class="form-group">
                    <label for="memberName">Full Name</label>
                    <input type="text" id="memberName" placeholder="e.g., G. Padmaja" required>
                </div>
                <div class="form-group">
                    <label for="memberEmail">Email Address</label>
                    <input type="email" id="memberEmail" placeholder="e.g., employee@oppty.com" required>
                </div>
                <div class="form-group">
                    <label for="memberRole">Role / Job Title</label>
                    <input type="text" id="memberRole" placeholder="e.g., Backend Developer" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="memberActive" checked>
                    <label for="memberActive">Is Active?</label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="cancelMemberBtn">Cancel</button>
                    <button type="submit" class="submit-btn">Add Member</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Task Modal -->
    <div class="modal-overlay" id="assignTaskModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Assign New Task</h2>
                <button class="modal-close" id="closeAssignTaskBtn">&times;</button>
            </div>
            <form id="newTaskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label for="taskAssignee">Assign To</label>
                    <select id="taskAssignee" required>
                        <option value="">Select a team member...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate" required>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" rows="3" placeholder="Provide task details..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="cancelTaskBtn">Cancel</button>
                    <button type="submit" class="submit-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>
    

    <script src="teamdetails.js"></script>
</body>
</html>
